name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          A33672: ${{ secrets.A33672 }}
          B00E24: ${{ secrets.B00E24 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A33672', '')
          bm = os.environ.get('B00E24', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 4bd0ab37496840ddf3b0b529d236bfd0 -->', gm)
          if bm:
              s2 = s2.replace('<!-- 24dd2d5a70a733b02c74b93a14d6060cb1dee42eda74 -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
